<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mobil Kryssord</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #facc15; --track: #f1f5f9; --correct: #22c55e; --wrong: #ef4444; --reveal: #8b5cf6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100dvh; background: var(--bg); color: white; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; display: flex; flex-direction: column; }
        header { flex-shrink: 0; display: flex; justify-content: space-between; padding: 10px; background: var(--panel); border-bottom: 1px solid #334155; align-items: center; }
        #clue-bar { flex-shrink: 0; padding: 12px; background: #334155; color: var(--accent); font-weight: 600; min-height: 55px; display: flex; align-items: center; justify-content: center; font-size: 0.95rem; text-align: center; }
        .controls { flex-shrink: 0; padding: 8px; background: var(--panel); display: flex; justify-content: center; gap: 4px; border-bottom: 1px solid #334155; }
        #grid-container { flex-grow: 1; overflow: auto; display: flex; align-items: flex-start; justify-content: center; padding: 20px; background: #020617; -webkit-overflow-scrolling: touch; }
        #grid { display: grid; gap: 1px; background: #334155; border: 2px solid #334155; margin: 0 auto; }
        
        .cell { width: 34px; height: 34px; background: white; color: black; position: relative; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 18px; }
        .cell.black { background: var(--bg); border: none; }
        .cell.track { background: #e2e8f0; } 
        
        /* THE SUBTLE YELLOW FIX */
        .cell.active { 
            background: #fef9c3 !important; /* Soft, pale subtle yellow */
            box-shadow: inset 0 0 0 2.5px #fde047; /* Subtle matching gold ring */
            z-index: 2; 
        }

        .cell.correct { background: var(--correct) !important; color: white; }
        .cell.wrong { background: var(--wrong) !important; color: white; }
        .number { position: absolute; top: 1px; left: 2px; font-size: 8px; color: #64748b; line-height: 1; }
        
        #keyboard { flex-shrink: 0; background: var(--panel); padding: 5px 2px 25px 2px; }
        .kb-row { display: flex; justify-content: center; margin-bottom: 5px; }
        .key { margin: 2px; padding: 14px 0; background: #475569; border-radius: 5px; flex: 1; max-width: 40px; font-weight: bold; font-size: 15px; text-align: center; color: white; box-shadow: 0 3px 0 #0f172a; }
        .key:active { transform: translateY(2px); box-shadow: none; background: #334155; }

        /* WIN SCREEN & BOUNCING TEXT */
        #win { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; animation: fadeIn 0.4s ease-out; overflow: hidden; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .win-title { 
            font-size: 3rem; margin-bottom: 10px; color: #fbbf24; 
            text-shadow: 0 0 20px rgba(251,191,36,0.4);
            animation: bounce 0.6s infinite alternate cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-15px); } }

        .confetti { position: absolute; width: 10px; height: 10px; z-index: 2001; pointer-events: none; }
        
        button, select { padding: 8px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-blue { background: #2563eb; color: white; }
        .btn-green { background: #10b981; color: white; }
        .btn-purple { background: var(--reveal); color: white; }
        .btn-red { background: #ef4444; color: white; }
        select { background: #475569; color: white; }
    </style>
</head>
<body>

<header>
    <select id="size-choice" onchange="initGame()">
        <option value="mini">Mini</option>
        <option value="medium" selected>Medium</option>
        <option value="large">Stor</option>
    </select>
    <button class="btn-blue" onclick="initGame()">NYTT SPILL</button>
</header>

<div id="clue-bar">Trykk på en hvit rute</div>
<div class="controls">
    <button class="btn-green" onclick="checkActiveWord()">SJEKK</button>
    <button class="btn-purple" onclick="revealLetter()">BOKSTAV</button>
    <button class="btn-purple" onclick="revealWord()">ORD</button>
    <button class="btn-red" onclick="resetCurrentWord()">TØM</button>
</div>

<div id="grid-container"><div id="grid"></div></div>
<div id="keyboard"></div>

<div id="win">
    <h1 class="win-title">🎉 HURRA!</h1>
    <p style="margin-bottom: 20px; font-size: 1.2rem; color: #bae6fd;">Du klarte hele brettet!</p>
    <button class="btn-blue" style="padding: 15px 30px; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(37,99,235,0.4);" onclick="initGame()">SPILL IGJEN</button>
</div>

<script>
const WORD_BANK = [
    {w:"BANAN", c:"Gul frukt"}, {w:"SOL", c:"Varm stjerne"}, {w:"KAFFE", c:"Mørk drikk"}, 
    {w:"NORGE", c:"Landet vårt"}, {w:"SKOLE", c:"Her lærer vi"}, {w:"BIL", c:"Kjøretøy"}, 
    {w:"ELG", c:"Skogens konge"}, {w:"VANN", c:"Det vi drikker"}, {w:"TRE", c:"Plante med stamme"},
    {w:"BÅT", c:"Flyter på sjøen"}, {w:"IS", c:"Kald og god"}, {w:"OST", c:"Gult på brødet"},
    {w:"BRØD", c:"Mat fra bakeren"}, {w:"SKO", c:"Går vi med"}, {w:"HUND", c:"Sier voff"},
    {w:"KATT", c:"Sier mjau"}, {w:"FLY", c:"Høyt i sky"}, {w:"HAMMER", c:"Treffer spikeren"},
    {w:"OSLO", c:"Hovedstaden"}, {w:"KLOKKE", c:"Hva er tiden?"}, {w:"GRØNN", c:"Gressets farge"},
    {w:"RØD", c:"Fargen på julenissen"}, {w:"BLÅ", c:"Himmelens farge"}, {w:"BORD", c:"Møbel til mat"}
];

let G = { size: 12, target: 12, grid: {}, words: [], user: {}, sel: null, dir: 'h', markers: {} };

function initGame() {
    const choice = document.getElementById('size-choice').value;
    if(choice === 'mini') { G.size = 10; G.target = 7; }
    else if(choice === 'medium') { G.size = 13; G.target = 11; }
    else { G.size = 18; G.target = 20; }
    G.grid = {}; G.words = []; G.user = {}; G.sel = null; G.markers = {}; G.dir = 'h';
    document.getElementById('win').style.display = 'none';
    removeConfetti();
    let pool = [...WORD_BANK].sort(() => Math.random() - 0.5);
    forcePlace(pool.pop(), 3, 3, 'h');
    for(let i = 0; i < 1500; i++) {
        if(G.words.length >= G.target) break;
        let w = pool[i % pool.length];
        if(G.words.find(exist => exist.w === w.w)) continue;
        for(let p of G.words) {
            for(let charIdx=0; charIdx < w.w.length; charIdx++) {
                let matchIdx = p.w.indexOf(w.w[charIdx]);
                if(matchIdx !== -1) {
                    let nDir = p.dir === 'h' ? 'v' : 'h';
                    let r = nDir === 'v' ? p.cells[matchIdx].r - charIdx : p.cells[matchIdx].r;
                    let c = nDir === 'h' ? p.cells[matchIdx].c - charIdx : p.cells[matchIdx].c;
                    if(isValid(w.w, r, c, nDir)) { forcePlace(w, r, c, nDir); break; }
                }
            }
            if(G.words.find(exist => exist.w === w.w)) break;
        }
    }
    let count = 1;
    let starts = G.words.map(w => ({k:`${w.cells[0].r}-${w.cells[0].c}`, r:w.cells[0].r, c:w.cells[0].c})).sort((a,b)=>a.r-b.r||a.c-b.c);
    starts.forEach(s => { if(!G.markers[s.k]) G.markers[s.k] = count++; });
    render();
}

function isValid(w, r, c, d) {
    if(r < 1 || c < 1 || (d==='v' && r+w.length >= G.size-1) || (d==='h' && c+w.length >= G.size-1)) return false;
    for(let i=0; i<w.length; i++) {
        let rr = d==='v'?r+i:r, cc = d==='h'?c+i:c;
        if(G.grid[`${rr}-${cc}`] && G.grid[`${rr}-${cc}`] !== w[i]) return false;
        if(!G.grid[`${rr}-${cc}`]) {
            let n = d==='h'?[[rr-1,cc],[rr+1,cc]]:[[rr,cc-1],[rr,cc+1]];
            for(let [nr,nc] of n) if(G.grid[`${nr}-${nc}`]) return false;
        }
    }
    return true;
}

function forcePlace(w, r, c, d) {
    let cells = [];
    for(let i=0; i<w.w.length; i++){
        let rr = d==='v'?r+i:r, cc = d==='h'?c+i:c;
        G.grid[`${rr}-${cc}`] = w.w[i];
        cells.push({r:rr, c:cc});
    }
    G.words.push({...w, cells, dir:d});
}

function render() {
    const el = document.getElementById("grid");
    el.innerHTML = "";
    el.style.gridTemplateColumns = `repeat(${G.size}, 34px)`;
    for(let r=0; r<G.size; r++) {
        for(let c=0; c<G.size; c++) {
            let k = `${r}-${c}`, d = document.createElement("div");
            d.className = "cell" + (G.grid[k] ? "" : " black");
            if(G.grid[k]) {
                if(G.markers[k]) d.innerHTML = `<span class="number">${G.markers[k]}</span>`;
                let t = document.createElement("div"); t.id = "t-"+k; d.appendChild(t);
                d.onclick = () => selectCell(k);
            }
            d.id = "c-"+k; el.appendChild(d);
        }
    }
    updateUI();
}

function selectCell(k) {
    document.querySelectorAll('.cell').forEach(e => e.classList.remove('correct','wrong'));
    let ws = G.words.filter(w => w.cells.some(c => `${c.r}-${c.c}` === k));
    if(!ws.length) return;
    if(G.sel === k) { if(ws.length > 1) G.dir = (G.dir === 'h' ? 'v' : 'h'); }
    else { G.sel = k; if(!ws.find(o => o.dir === G.dir)) G.dir = ws[0].dir; }
    updateUI();
}

function getAW() { return G.words.find(w => w.dir === G.dir && w.cells.some(c => `${c.r}-${c.c}` === G.sel)); }
function checkActiveWord() {
    let aw = getAW(); if(!aw) return;
    aw.cells.forEach((c, i) => {
        let el = document.getElementById("c-"+c.r+"-"+c.c);
        if(G.user[`${c.r}-${c.c}`] === aw.w[i]) el.classList.add("correct");
        else if(G.user[`${c.r}-${c.c}`]) el.classList.add("wrong");
    });
}
function revealLetter() { if(G.sel) { G.user[G.sel] = G.grid[G.sel]; updateUI(); checkWin(); } }
function revealWord() { let aw = getAW(); if(aw) { aw.cells.forEach(c => G.user[`${c.r}-${c.c}`] = G.grid[`${c.r}-${c.c}`]); updateUI(); checkWin(); } }
function resetCurrentWord() { let aw = getAW(); if(aw) { aw.cells.forEach(c => G.user[`${c.r}-${c.c}`] = ""); updateUI(); } }

function checkWin() { 
    if(Object.keys(G.grid).length > 0 && Object.keys(G.grid).every(k => G.user[k] === G.grid[k])) {
        document.getElementById('win').style.display='flex';
        spawnCheerfulConfetti();
        setTimeout(spawnCheerfulConfetti, 600);
        setTimeout(spawnCheerfulConfetti, 1200);
    } 
}

function spawnCheerfulConfetti() {
    const vw = window.innerWidth, vh = window.innerHeight;
    for(let i=0; i<70; i++) {
        let c = document.createElement('div');
        c.className = 'confetti';
        c.style.top = (vh/2) + 'px';
        c.style.left = (vw/2) + 'px';
        c.style.background = `hsl(${Math.random()*360}, 100%, 65%)`;
        document.getElementById('win').appendChild(c);
        const xDir = (Math.random() - 0.5) * vw * 2.0; 
        const yDir = (Math.random() - 0.5) * vh * 2.0;
        c.animate([
            { transform: `translate(0, 0) scale(1) rotate(0deg)`, opacity: 1 },
            { transform: `translate(${xDir}px, ${yDir}px) scale(0.5) rotate(${Math.random()*1200}deg)`, opacity: 0 }
        ], { duration: 2800, easing: 'cubic-bezier(0, .9, .3, 1)', fill: 'forwards' });
    }
}

function removeConfetti() { document.querySelectorAll('.confetti').forEach(c => c.remove()); }

function updateUI() {
    document.querySelectorAll('.cell').forEach(e => e.classList.remove('active', 'track'));
    let aw = getAW();
    if(G.sel && aw) {
        document.getElementById("c-"+G.sel).classList.add("active");
        aw.cells.forEach(c => document.getElementById(`c-${c.r}-${c.c}`).classList.add('track'));
        let headK = `${aw.cells[0].r}-${aw.cells[0].c}`;
        document.getElementById("clue-bar").innerText = `${G.markers[headK]} ${G.dir==='h'?'VANNRETT':'LODDRETT'}: ${aw.c}`;
    }
    Object.keys(G.grid).forEach(k => {
        const target = document.getElementById("t-"+k);
        if (target) target.innerText = G.user[k] || "";
    });
}

function handleInput(key) {
    let aw = getAW(); if(!aw) return;
    let idx = aw.cells.findIndex(c => `${c.r}-${c.c}` === G.sel);
    if(key === "⌫") { G.user[G.sel] = ""; if(idx > 0) G.sel = `${aw.cells[idx-1].r}-${aw.cells[idx-1].c}`; }
    else { G.user[G.sel] = key; if(idx < aw.cells.length - 1) G.sel = `${aw.cells[idx+1].r}-${aw.cells[idx+1].c}`; }
    updateUI(); checkWin();
}

const kb = document.getElementById("keyboard");
[["Q","W","E","R","T","Y","U","I","O","P","Å"],["A","S","D","F","G","H","J","K","L","Ø","Æ"],["Z","X","C","V","B","N","M","⌫"]].forEach(row => {
    let r = document.createElement("div"); r.className = "kb-row";
    row.forEach(key => {
        let k = document.createElement("div"); k.className = "key"; k.innerText = key;
        k.onclick = (e) => { e.preventDefault(); handleInput(key); }; r.appendChild(k);
    });
    kb.appendChild(r);
});
initGame();
</script>
</body>
</html>
