<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">

    <title>Norsk Kryssord</title>
    <style>
        :root { 
            --bg: #0f172a; --panel: #1e293b; --accent: #facc15; 
            --track: #bae6fd; --active-yellow: #fef9c3; 
            --correct: #22c55e; --wrong: #ef4444; --reveal: #8b5cf6; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100dvh; background: var(--bg); color: white; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; display: flex; flex-direction: column; }
        
        header { flex-shrink: 0; display: flex; justify-content: space-between; padding: 10px; background: var(--panel); border-bottom: 1px solid #334155; align-items: center; }
        #clue-bar { flex-shrink: 0; padding: 12px; background: #334155; color: var(--accent); font-weight: 600; min-height: 55px; display: flex; align-items: center; justify-content: center; font-size: 0.95rem; text-align: center; }
        .controls { flex-shrink: 0; padding: 8px; background: var(--panel); display: flex; justify-content: center; gap: 4px; border-bottom: 1px solid #334155; }
        
        #grid-container { flex-grow: 1; overflow: hidden; display: flex; align-items: center; justify-content: center; padding: 10px; background: #020617; position: relative; }
        #grid { display: grid; gap: 1px; background: #334155; border: 2px solid #334155; margin: 0 auto; }
        
        .cell { width: 32px; height: 32px; background: white; color: black; position: relative; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 16px; }
        .cell.black { background: var(--bg); border: none; }
        .cell.track { background: var(--track) !important; }
        .cell.active { background: var(--active-yellow) !important; box-shadow: inset 0 0 0 3px #fde047; z-index: 2; }
        .cell.correct { background: var(--correct) !important; color: white; }
        .cell.wrong { background: var(--wrong) !important; color: white; }
        .number { position: absolute; top: 1px; left: 2px; font-size: 8px; color: #64748b; line-height: 1; pointer-events: none; }

        #keyboard { flex-shrink: 0; background: var(--panel); padding: 5px 2px 20px 2px; }
        .kb-row { display: flex; justify-content: center; margin-bottom: 4px; }
        .key { margin: 2px; padding: 12px 0; background: #475569; border-radius: 5px; flex: 1; max-width: 38px; font-weight: bold; font-size: 14px; text-align: center; color: white; box-shadow: 0 3px 0 #0f172a; cursor: pointer; }
        
        #win { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
        .win-title { font-size: 3rem; color: var(--accent); margin: 0; }
        .win-btns { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; width: 200px; }
        .confetti { position: absolute; width: 10px; height: 10px; z-index: 2001; pointer-events: none; }

        button, select { padding: 8px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        .btn-blue { background: #2563eb; color: white; }
        .btn-green { background: #10b981; color: white; }
        .btn-purple { background: var(--reveal); color: white; }
        .btn-red { background: #ef4444; color: white; }
        .btn-outline { background: transparent; border: 2px solid white; color: white; }
    </style>
</head>
<body>

<header>
    <select id="size-choice" onchange="startNewOrLoad()">
        <option value="mini">Mini</option>
        <option value="medium" selected>Medium</option>
        <option value="large">Stor</option>
    </select>
    <button class="btn-blue" onclick="forceNewGame()">NYTT SPILL</button>
</header>

<div id="clue-bar">Trykk på en hvit rute</div>
<div class="controls">
    <button class="btn-green" onclick="checkActiveWord()">SJEKK</button>
    <button class="btn-purple" onclick="revealLetter()">BOKSTAV</button>
    <button class="btn-purple" onclick="revealWord()">ORD</button>
    <button class="btn-red" onclick="resetCurrentWord()">TØM</button>
</div>

<div id="grid-container">
    <div id="grid"></div>
</div>

<div id="keyboard"></div>

<div id="win">
    <h1 class="win-title">🎉 HURRA!</h1>
    <p style="margin: 10px 0; font-size: 1.2rem; color: #bae6fd;">Brettet er fullført!</p>
    <div class="win-btns">
        <button class="btn-blue" style="padding: 15px;" onclick="forceNewGame()">SPILL IGJEN</button>
        <button class="btn-outline" style="padding: 15px;" onclick="hideWinScreen()">SE BRETTET</button>
    </div>
</div>

let G = { size: 11, target: 10, grid: {}, words: [], user: {}, sel: null, dir: 'h', markers: {} };

function saveGame() {
    const choice = document.getElementById('size-choice').value;
    const saveObj = { grid: G.grid, words: G.words, user: G.user, markers: G.markers, size: G.size, target: G.target };
    localStorage.setItem('kryssord_save_' + choice, JSON.stringify(saveObj));
}

function loadGame() {
    const choice = document.getElementById('size-choice').value;
    const saved = localStorage.getItem('kryssord_save_' + choice);
    if (!saved) return false;
    const data = JSON.parse(saved);
    G = { ...G, ...data };
    return true;
}

function clearSave() {
    const choice = document.getElementById('size-choice').value;
    localStorage.removeItem('kryssord_save_' + choice);
}

function startNewOrLoad() {
    if (loadGame()) {
        document.getElementById('win').style.display = 'none';
        removeConfetti();
        render();
        if (G.sel) selectCell(G.sel);
    } else {
        initGame();
    }
}

function forceNewGame() {
    clearSave();
    initGame();
}

function hideWinScreen() {
    document.getElementById('win').style.display = 'none';
    document.getElementById('clue-bar').innerText = "Gratulerer! Du klarte det!";
}

function initGame() {
    const choice = document.getElementById('size-choice').value;
    G.size = choice === 'mini' ? 10 : choice === 'medium' ? 12 : 14;
    G.target = choice === 'mini' ? 7 : choice === 'medium' ? 10 : 15;
    G.grid = {}; G.words = []; G.user = {}; G.sel = null; G.markers = {}; G.dir = 'h';
    document.getElementById('win').style.display = 'none';
    removeConfetti();

    let pool = [...WORD_BANK].sort(() => Math.random() - 0.5);
    forcePlace(pool.pop(), 2, 2, 'h');

    for(let i = 0; i < 2000; i++) {
        if(G.words.length >= G.target) break;
        let w = pool[i % pool.length];
        if(G.words.find(ex => ex.w === w.w)) continue;

        for(let p of G.words) {
            for(let j=0; j<w.w.length; j++) {
                let matchIdx = p.w.indexOf(w.w[j]);
                if(matchIdx !== -1) {
                    let nDir = p.dir === 'h' ? 'v' : 'h';
                    let r = nDir === 'v' ? p.cells[matchIdx].r - j : p.cells[matchIdx].r;
                    let c = nDir === 'h' ? p.cells[matchIdx].c - j : p.cells[matchIdx].c;
                    if(isValid(w.w, r, c, nDir)) { forcePlace(w, r, c, nDir); break; }
                }
            }
            if(G.words.find(ex => ex.w === w.w)) break;
        }
    }
    let count = 1;
    let starts = G.words.map(w => ({k:`${w.cells[0].r}-${w.cells[0].c}`, r:w.cells[0].r, c:w.cells[0].c})).sort((a,b)=>a.r-b.r||a.c-b.c);
    starts.forEach(s => { if(!G.markers[s.k]) G.markers[s.k] = count++; });
    
    render();
    saveGame();
}

function isValid(w, r, c, d) {
    if(r < 1 || c < 1 || (d==='v' && r+w.length >= G.size-1) || (d==='h' && c+w.length >= G.size-1)) return false;
    for(let i=-1; i<=w.length; i++) {
        let rr = d==='v'?r+i:r, cc = d==='h'?c+i:c;
        let cellExist = G.grid[`${rr}-${cc}`];
        if(i === -1 || i === w.length) { if(cellExist) return false; continue; }
        if(cellExist && cellExist !== w[i]) return false;
        if(!cellExist) {
            let neighbors = d==='h' ? [[rr-1,cc],[rr+1,cc]] : [[rr,cc-1],[rr,cc+1]];
            for(let [nr,nc] of neighbors) if(G.grid[`${nr}-${nc}`]) return false;
        }
    }
    return true;
}

function forcePlace(w, r, c, d) {
    let cells = [];
    for(let i=0; i<w.w.length; i++){
        let rr = d==='v'?r+i:r, cc = d==='h'?c+i:c;
        G.grid[`${rr}-${cc}`] = w.w[i];
        cells.push({r:rr, c:cc});
    }
    G.words.push({...w, cells, dir:d});
}

function render() {
    const el = document.getElementById("grid");
    el.innerHTML = ""; el.style.gridTemplateColumns = `repeat(${G.size}, 32px)`;
    for(let r=0; r<G.size; r++) {
        for(let c=0; c<G.size; c++) {
            let k = `${r}-${c}`, d = document.createElement("div");
            d.className = "cell" + (G.grid[k] ? "" : " black");
            if(G.grid[k]) {
                if(G.markers[k]) d.innerHTML = `<span class="number">${G.markers[k]}</span>`;
                let t = document.createElement("div"); t.id = "t-"+k; 
                t.innerText = G.user[k] || "";
                d.appendChild(t);
                d.onclick = () => selectCell(k);
            }
            d.id = "c-"+k; el.appendChild(d);
        }
    }
    updateUI();
}

function selectCell(k) {
    document.querySelectorAll('.cell').forEach(e => e.classList.remove('correct','wrong'));
    let ws = G.words.filter(w => w.cells.some(c => `${c.r}-${c.c}` === k));
    if(!ws.length) return;
    if(G.sel === k && ws.length > 1) G.dir = (G.dir === 'h' ? 'v' : 'h');
    else { G.sel = k; if(!ws.find(o => o.dir === G.dir)) G.dir = ws[0].dir; }
    updateUI();
    saveGame();
}

function getAW() { return G.words.find(w => w.dir === G.dir && w.cells.some(c => `${c.r}-${c.c}` === G.sel)); }

function checkActiveWord() {
    let aw = getAW(); if(!aw) return;
    aw.cells.forEach((c, i) => {
        let el = document.getElementById("c-"+c.r+"-"+c.c);
        el.classList.add(G.user[`${c.r}-${c.c}`] === aw.w[i] ? "correct" : "wrong");
    });
}

function revealLetter() { if(G.sel) { G.user[G.sel] = G.grid[G.sel]; updateUI(); checkWin(); saveGame(); } }
function revealWord() { let aw = getAW(); if(aw) { aw.cells.forEach(c => G.user[`${c.r}-${c.c}`] = G.grid[`${c.r}-${c.c}`]); updateUI(); checkWin(); saveGame(); } }
function resetCurrentWord() { let aw = getAW(); if(aw) { aw.cells.forEach(c => G.user[`${c.r}-${c.c}`] = ""); updateUI(); saveGame(); } }

function checkWin() { 
    if(Object.keys(G.grid).length > 0 && Object.keys(G.grid).every(k => G.user[k] === G.grid[k])) {
        document.getElementById('win').style.display='flex';
        spawnConfetti();
        clearSave();
    } 
}

function spawnConfetti() {
    const vw = window.innerWidth, vh = window.innerHeight;
    for(let i=0; i<100; i++) {
        let c = document.createElement('div');
        c.className = 'confetti';
        c.style.top = (vh/2) + 'px'; c.style.left = (vw/2) + 'px';
        c.style.background = `hsl(${Math.random()*360}, 100%, 60%)`;
        document.body.appendChild(c);
        const x = (Math.random() - 0.5) * vw * 2;
        const y = (Math.random() - 0.5) * vh * 2;
        c.animate([{ transform: `translate(0,0) scale(1)`, opacity: 1 }, { transform: `translate(${x}px, ${y}px) scale(0) rotate(${Math.random()*1000}deg)`, opacity: 0 }], { duration: 3000, easing: 'cubic-bezier(0, .9, .3, 1)', fill: 'forwards' });
        setTimeout(() => c.remove(), 3000);
    }
}

function removeConfetti() { document.querySelectorAll('.confetti').forEach(c => c.remove()); }

function updateUI() {
    document.querySelectorAll('.cell').forEach(e => e.classList.remove('active', 'track'));
    let aw = getAW();
    if(G.sel && aw) {
        const selEl = document.getElementById("c-"+G.sel);
        if(selEl) selEl.classList.add("active");
        aw.cells.forEach(c => {
            const trackEl = document.getElementById(`c-${c.r}-${c.c}`);
            if(trackEl) trackEl.classList.add('track');
        });
        let headK = `${aw.cells[0].r}-${aw.cells[0].c}`;
        document.getElementById("clue-bar").innerText = `${G.markers[headK]} ${G.dir==='h'?'VANNRETT':'LODDRETT'}: ${aw.c}`;
    }
    Object.keys(G.grid).forEach(k => { if(document.getElementById("t-"+k)) document.getElementById("t-"+k).innerText = G.user[k] || ""; });
}

function handleInput(key) {
    let aw = getAW(); if(!aw) return;
    let idx = aw.cells.findIndex(c => `${c.r}-${c.c}` === G.sel);
    if(key === "⌫") {
        G.user[G.sel] = "";
        if(idx > 0) G.sel = `${aw.cells[idx-1].r}-${aw.cells[idx-1].c}`;
    } else {
        G.user[G.sel] = key;
        if(idx < aw.cells.length - 1) G.sel = `${aw.cells[idx+1].r}-${aw.cells[idx+1].c}`;
    }
    updateUI(); checkWin(); saveGame();
}

const kb = [["Q","W","E","R","T","Y","U","I","O","P","Å"],["A","S","D","F","G","H","J","K","L","Ø","Æ"],["Z","X","C","V","B","N","M","⌫"]];
kb.forEach(row => {
    let r = document.createElement("div"); r.className = "kb-row";
    row.forEach(key => {
        let k = document.createElement("div"); k.className = "key"; k.innerText = key;
        k.onclick = (e) => { e.preventDefault(); handleInput(key); }; r.appendChild(k);
    });
    document.getElementById("keyboard").appendChild(r);
});

window.onload = startNewOrLoad;
</script>
</body>
</html>
